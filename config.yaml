timeframes:
  "1m":  { granularity: 60,    htf_gran: 300,   htf2_gran: 900 }
  "5m":  { granularity: 300,   htf_gran: 900,   htf2_gran: 3600 }
  "15m": { granularity: 900,   htf_gran: 1800,  htf2_gran: 3600 }
  "30m": { granularity: 1800,  htf_gran: 3600,  htf2_gran: 14400 }
  "1h":  { granularity: 3600,  htf_gran: 14400, htf2_gran: 86400 }
  "4h":  { granularity: 14400, htf_gran: 86400, htf2_gran: 604800 }

scan_interval_seconds: 300
candle_count: 300
htf_candle_count: 100

signal_rules:
  min_score: 10
  min_margin: 4
  rsi_overbought: 70
  rsi_oversold: 30
